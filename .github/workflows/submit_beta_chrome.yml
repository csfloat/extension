name: Submit Beta to Chrome Web Store

on:
  push:
    branches: [ "master" ]
  # Allows you to trigger a beta build manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Swap Environment for Beta
        run: cp src/environment.beta.ts src/environment.ts

      - name: Build Extension
        run: npm run build

      # https://developer.chrome.com/docs/extensions/develop/migrate/publish-mv3#publish-beta
      - name: Dynamically Patch Manifest for Beta
        run: |
          jq '
            .name += " - BETA" |
            .short_name += " (Beta)" |
            .version_name = (.version + " (Beta)") |
            .externally_connectable.matches = (.externally_connectable.matches + ["*://*.csfloat.build/*"] | unique) |
            .web_accessible_resources[0].matches = (.web_accessible_resources[0].matches + ["https://csfloat.build/*"] | unique)
          ' dist/manifest.json > tmp.json && mv tmp.json dist/manifest.json

      - name: Zip Beta Extension
        run: |
          cd dist
          zip -r ../beta-extension.zip .
          cd ..

      - name: Publish to Chrome Web Store (Beta)
        uses: browser-actions/release-chrome-extension@v0.2.1
        with:
          extension-id: ${{ secrets.BETA_CHROME_EXTENSION_ID }}
          extension-path: ./beta-extension.zip
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.OAUTH_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.OAUTH_REFRESH_TOKEN }}